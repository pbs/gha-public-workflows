name: Test - run-commands-template.yml template

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch: # allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests group

    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8, 9]

    steps:
      - name: Run tests
        run: |
          url_list=(
            "https://media.console.pbs.org/djadmin/"
            "https://nexus.pbs.org/nexus/"
            "https://google.com/"
            "https://www.pbs.org/"
            "https://www.youtube.com/"
            "https://www.pbs.org/shows/"
            "https://www.pbs.org/newshour/"
          )

          for url in "${url_list[@]}"; do
            echo -n "Testing $url ... "
            http_code=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 10 --connect-timeout 5 "$url")
            exit_code=$?
            if [ $exit_code -eq 28 ]; then
              echo "TIMEOUT"
            elif [ $exit_code -ne 0 ]; then
              echo "FAILED (curl exit code: $exit_code)"
            else
              echo "HTTP $http_code"
            fi
          done


